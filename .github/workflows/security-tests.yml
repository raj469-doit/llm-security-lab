name: LLM Security Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'   # Run every Monday at 9am UTC

jobs:
  security-tests:
    runs-on: ubuntu-latest
    name: LLM Security Tests (All Modules)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy lib/ conftest.py attacks/

      - name: Run all security test suites
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL:   ${{ secrets.LLM_MODEL }}
        run: |
          pytest attacks/ -v \
            --html=reports/ci_findings.html \
            --self-contained-html \
            -p no:warnings

      - name: Upload findings report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-findings
          path: reports/
          retention-days: 30
